{% extends "base.jinja" %}
{% import 'macros.jinja' as funcs %}

{% block volumes %}
{{- funcs.add_vol_datavolume("rootdisk", datavolume_name) -}}
{% endblock %}

{% block other_devices %}
{{ super() }}
{{- "          watchdog: " }}
            name: watchdog
            i6300esb:
              action: "poweroff"
{% endblock %}

{% block run_strategy %}
  runStrategy: 'Manual'
{% endblock %}

{% block domain_others %}
        features:
          acpi: {}
          smm:
            enabled: true
        firmware:
          bootloader:
            efi: {}
{% endblock %}

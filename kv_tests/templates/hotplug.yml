{% extends "base.jinja" %}
{% import 'macros.jinja' as funcs %}

{% block datavolume_source %}
          http:
            url: >-
              {% set url = "http://image-server/RHEL-9.7-x86_64-latest-ovmf.qcow2" %}
              {{ url }}
{% endblock %}

{% block volumes %}
{{- funcs.add_vol_datavolume("rootdisk", datavolume_name) -}}
{% endblock %}

{% block domain_cpu %}
        cpu:
          cores: 1
          sockets: 2
          threads: 1
{% endblock %}

{% block domain_others %}
        features:
          acpi: {}
          smm:
            enabled: true
        firmware:
          bootloader:
            efi: {}
{% endblock %}

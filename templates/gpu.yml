          acpi: {}
          smm:
            enabled: true
        firmware:
          bootloader:
            efi: {}
{% endblock %}

{% block other_devices %}
{{ super() }}
{{- "          gpus:" }}
          - deviceName: nvidia.com/NVIDIA_A2_A16
            name: auto_gpu_dev
{% endblock %}
